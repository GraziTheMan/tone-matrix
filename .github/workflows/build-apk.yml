name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build web app
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — add it (and ANDROID_KEYSTORE_PASSWORD) in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/tonematrix.keystore"

      - name: Build release APK and Play bundle
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/tonematrix.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 0.1.${{ github.run_number }}
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: tone-matrix-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: tone-matrix-playstore-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
